name: CI

# The enforced test + build gate. azure-deploy.yml ships the image but never
# runs the suite — this workflow does, on every PR and every push to main, so a
# red X lands on the commit BEFORE (PR) or alongside (main) the deploy. Turn on
# "Require status checks to pass" for the `test` job in branch protection to make
# it a true merge gate.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# A newer push to the same ref cancels the in-flight CI run — no point finishing
# a suite for a commit that's already been superseded.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    # Postgres service container for the integration suite. Production runs
    # PostgreSQL 18; matching the major version here catches version-specific
    # SQL (jsonb_set, etc.) the same way prod would. POSTGRES_DB creates the
    # test database up-front — the suite's globalSetup runs `prisma db push`
    # but NOT `CREATE DATABASE`, so the DB must already exist.
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: diagramatix_test
        ports:
          - 5432:5432
        # Wait for the server to accept connections before the job runs.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # The suite's globalSetup reads TEST_DATABASE_URL (falls back to this same
      # default locally) and pins DATABASE_URL to it for the production db.ts
      # singleton. Points at the service container created above.
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/diagramatix_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: diagramatix/package-lock.json

      - name: Install dependencies
        working-directory: ./diagramatix
        # Full install (incl. devDeps — vitest, prisma) — NOT --omit=dev like the
        # deploy job, the suite needs the dev toolchain.
        run: npm ci

      - name: Generate Prisma client
        working-directory: ./diagramatix
        # The app imports app/generated/prisma/client — generate it before the
        # suite (and the build) load it.
        run: npx prisma generate

      - name: Run test suite
        working-directory: ./diagramatix
        # globalSetup applies the schema to the test DB via `prisma db push`
        # then every file runs against it (fileParallelism is off in the config,
        # so the shared DB is never raced).
        run: npm test

      - name: Production build
        working-directory: ./diagramatix
        # Catches build/type breaks here (PR) instead of in the Docker build on
        # main — e.g. a dependency present in the root package.json but missing
        # from diagramatix/package.json. No DB needed for the build itself.
        run: npm run build
